name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/chrysb/openclaw-railway-template.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Attempt merge
        id: merge
        run: |
          if git merge upstream/main --no-edit -m "Sync with upstream chrysb/openclaw-railway-template"; then
            if git diff --quiet HEAD@{1} HEAD; then
              echo "result=noop" >> "$GITHUB_OUTPUT"
            else
              echo "result=merged" >> "$GITHUB_OUTPUT"
            fi
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged main
        if: steps.merge.outputs.result == 'merged'
        run: git push origin main

      - name: Open conflict issue
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream sync conflict — manual merge required';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['upstream-sync'],
              body: [
                'The scheduled sync workflow could not auto-merge `upstream/main` into `main` due to conflicts.',
                '',
                'Resolve manually:',
                '```',
                'git remote add upstream https://github.com/chrysb/openclaw-railway-template.git',
                'git fetch upstream',
                'git checkout main',
                'git merge upstream/main',
                '# resolve conflicts, then:',
                'git push origin main',
                '```',
                '',
                'Workflow run: ' + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            });
